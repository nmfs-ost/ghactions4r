# check spelling using spelling::spell_check_package()
on:
 workflow_call:

name: run devtools::spell_check

# no permissions are needed by the default github token for this workflow to 
# run, so don't pass any.
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install spelling
        run: Rscript -e 'install.packages("spelling")'

      - name: spell check
        run: |
          results <- spelling::spell_check_package()
          if(nrow(results)>0) {
            print(results)
            stop("Spelling errors found.\n", 
            "Need to ignore some words? Read up on using the WORDLIST file:\n",
            "https://docs.ropensci.org/spelling/reference/wordlist.html")
          }
          code_files <- list.files(
            c("R", "tests"),
            recursive = TRUE,
            full.names = TRUE,
            pattern = "\\.md|\\.R$|\\.Rmd|\\.txt"
          )
          word_list <- spelling::get_wordlist()
          results_spelling <- spelling::spell_check_files(
            code_files,
            ignore = word_list
          )
          cat("::set-output name=nrow_results_spelling::", nrow(results_spelling), sep = "")
        shell: Rscript {0}

      - name: ⚠️ Write spell check notice
        # If nrow(results_spelling)>0 then this will be run and print out a notice
        # to the action log. This is useful for the user to know that they need to
        # update the WORDLIST file in order to ignore certain words.
        # This is a notice and not an error, so the workflow will not fail.
        if: steps.spell-check.outputs.nrow_results_spelling > 0
        run: |
          echo "::notice title=Spelling errors found in R/ and tests/::Need to ignore some words? Read up on using the WORDLIST file: https://docs.ropensci.org/spelling/reference/wordlist.html"
          
